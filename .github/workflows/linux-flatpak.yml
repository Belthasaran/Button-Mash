name: Linux flatpak build

on:
  push:
    branches: [ master, buttonmash-rhp ]
    tags:
      - '*'
  pull_request:
    branches: [ master, buttonmash-rhp ]
  workflow_dispatch:

jobs:
  flatpak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build and flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            qtbase5-dev qttools5-dev-tools \
            libqt5websockets5-dev libqt5gamepad5-dev libqt5serialport5-dev \
            libssl-dev imagemagick \
            flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub \
            org.kde.Sdk/x86_64/5.15-22.08 \
            org.kde.Platform/x86_64/5.15-22.08

      - name: Build SQPackager
        run: |
          cd sqpackager
          qmake SQPackager.pro CONFIG+=release
          make -j"$(nproc)"
          sudo install -m 755 SQPackager /usr/local/bin/SQPackager

      - name: Verify browser-source assets
        run: |
          test -f browser-source/main.html
          test -f browser-source/stacked.html
          test -f browser-source/piano.html
          test -f browser-source/css/display.css
          test -f browser-source/js/websocket-client.js
          test -f browser-source/js/main-renderer.js
          test -f browser-source/js/piano-renderer.js

      - name: Generate flatpak packaging files
        run: |
          SQPackager --gen-unix
          SQPackager --gen-flatpak

      - name: Build flatpak bundle
        run: SQPackager --build flatpak

      - name: Upload flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: ButtonMash-flatpak
          path: Button-Mash.flatpak

      - name: Release flatpak
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Button-Mash.flatpak
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
