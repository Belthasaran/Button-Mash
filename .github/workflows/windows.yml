# This is a basic workflow to help you get started with Actions

name: Windows build

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events for main development branches
  push:
    branches: [ master, buttonmash-rhp ]
    tags:
      - '*'
  pull_request:
    branches: [ master, buttonmash-rhp ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: little-core-labs/get-git-tag@v3.0.1
        id: tagName
      -
        name: Checkout
        uses: actions/checkout@v2
        with: 
          submodules : true
      -
       # I wish I could use Chocolatey or something else but it's a pain in the but
        name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
      -
        name: Install SPackager
        uses: Belthasaran/sqpackager-action@sqpackager-action-rhp
      -
        name: Install 7-Zip
        run: choco install 7zip -y
        shell: pwsh
      -
        name: Install OpenSSL
        run: |
          choco install openssl -y --no-progress
          if (Test-Path 'C:\Program Files\OpenSSL-Win64\include\openssl\evp.h') {
            $src = 'C:\Program Files\OpenSSL-Win64'
          } elseif (Test-Path 'C:\Program Files\OpenSSL\include\openssl\evp.h') {
            $src = 'C:\Program Files\OpenSSL'
          } else {
            throw 'OpenSSL headers not found after choco install'
          }
          if (-not (Test-Path 'C:\openssl')) {
            New-Item -ItemType Junction -Path 'C:\openssl' -Target $src | Out-Null
          }
          echo "OPENSSL_ROOT_DIR=C:/openssl" >> $env:GITHUB_ENV
          Get-Item 'C:\openssl\include\openssl\evp.h'
          $runtimeDir = 'third_party/openssl-win64'
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          Copy-Item 'C:\openssl\bin\libcrypto*.dll' $runtimeDir -Force
          if (-not (Get-ChildItem $runtimeDir -Filter 'libcrypto*.dll')) {
            throw 'OpenSSL libcrypto runtime DLL not found'
          }
        shell: pwsh
      -
        name: Verify browser-source assets
        run: |
          $files = @(
            'browser-source/main.html',
            'browser-source/stacked.html',
            'browser-source/piano.html',
            'browser-source/css/display.css',
            'browser-source/js/websocket-client.js',
            'browser-source/js/main-renderer.js',
            'browser-source/js/piano-renderer.js'
          )
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { throw "Missing required file: $f" }
          }
        shell: pwsh
      -
        name: build
        id: build
        run: SQPackager --build windows
      -
        name: Bundle OpenSSL into standalone archive
        run: |
          $archive = "${{ steps.build.outputs.sqpackager_win32_x64_standalone_7zip_non_native_path }}"
          if (-not (Test-Path $archive)) { throw "Standalone archive not found: $archive" }
          $work = Join-Path $env:RUNNER_TEMP 'buttonmash-repack'
          Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $work | Out-Null
          & 7z x $archive "-o$work" -y
          $appDir = Get-ChildItem $work -Directory | Select-Object -First 1
          if (-not $appDir) { throw 'No application directory inside standalone archive' }
          Copy-Item 'third_party/openssl-win64/libcrypto*.dll' $appDir.FullName -Force
          if (-not (Get-ChildItem $appDir.FullName -Filter 'libcrypto*.dll')) {
            throw 'libcrypto runtime DLL was not bundled into the archive'
          }
          Remove-Item $archive -Force
          Push-Location $work
          & 7z a -t7z $archive .\*
          Pop-Location
        shell: pwsh
      -
        name: Upload 7zip
        uses: actions/upload-artifact@v4
        with:
          name: ButtonMash-Standalone.7z
          path: ${{ steps.build.outputs.sqpackager_win32_x64_standalone_7zip }}
      -
        name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
                 ${{ steps.build.outputs.sqpackager_win32_x64_standalone_7zip_non_native_path }}
                 ${{ steps.build.outputs.sqpackager_win32_x64_innosetup_non_native_path }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
